name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  # 🔵 EXISTING PYTHON JOB
  python-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m pytest


  # 🟢 NEW DEVOPS LAB JOB (IMPORTANT)
  devops-lab:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devops-lab

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: mvn clean install

      - name: Run Tests
        run: mvn test

      - name: Build Docker Image
        run: docker build -t devops-lab .